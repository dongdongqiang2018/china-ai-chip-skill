name: Validate Skills

on:
  push:
    branches: [main, master]
    paths:
      - 'skills/**'
      - 'scripts/validate_skills.py'
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/validate_skills.py'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Validate skills
        run: |
          python scripts/validate_skills.py